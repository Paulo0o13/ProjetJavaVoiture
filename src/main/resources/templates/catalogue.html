<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catalogue des voitures</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" />
    <link rel="stylesheet" th:href="@{/bg.css}" />
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">

<div class="page">
    <div th:replace="~{navbar :: maNavbar}"></div>

    <div class="page-wrapper">
        <div class="container-xl py-4">
            <div class="page-header mb-4">
                <div class="row align-items-center">
                    <div class="col">
                        <h2 class="page-title text-white">Catalogue</h2>
                        <div class="text-muted mt-1">Découvrez nos véhicules disponibles immédiatement.</div>
                    </div>
                </div>
            </div>

            <div id="car-list" class="row row-cards">
                <div class="col-sm-6 col-lg-4" th:each="c : ${cars}">
                    <div class="card card-sm glass-card shadow-sm">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <div>
                                    <div class="fw-bold text-white" style="font-size: 1.2rem;" th:text="${c.marque + ' ' + c.modele}">Marque Modèle</div>
                                    <div class="text-muted" th:text="${c.annee + ' - ' + c.couleur}">2022 - Noir</div>
                                </div>
                                <div class="ms-auto">
                                    <span class="badge bg-blue-lt" th:text="${c.typeOffre}">ACHAT</span>
                                </div>
                            </div>
                            <div class="h1 mb-3 text-white" th:text="${c.prix + ' €'}">15 000 €</div>

                            <div class="d-grid gap-2">
                                <div th:if="${loggedUser != null && loggedUser.role != 'ADMIN'}" class="d-grid">
                                    <button class="btn btn-custom"
                                            data-bs-toggle="modal"
                                            data-bs-target="#modal-paiement"
                                            th:attr="data-car-id=${c.id}">
                                        <span th:text="${c.typeOffre == 'LOCATION' ? 'Louer maintenant' : 'Acheter'}">Action</span>
                                    </button>
                                </div>

                                <div th:if="${loggedUser != null && loggedUser.role == 'ADMIN'}" class="row g-2">
                                    <div class="col-6">
                                        <a th:href="@{/admin/edit-car/{id}(id=${c.id})}" class="btn btn-outline-primary w-100">
                                            Modifier
                                        </a>
                                    </div>
                                    <div class="col-6">
                                        <a th:href="@{/admin/delete/{id}(id=${c.id})}" class="btn btn-outline-danger w-100">
                                            Supprimer
                                        </a>
                                    </div>
                                </div>

                                <a th:if="${loggedUser == null}" th:href="@{/login}" class="btn btn-outline-light">Connectez-vous pour commander</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(cars)}" class="text-center py-5">
                    <h3 class="text-white">Le catalogue est actuellement vide.</h3>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal modal-blur fade" id="modal-paiement" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content shadow-lg" style="background-color: rgba(20, 25, 35, 0.95); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden;">

            <form id="form-paiement" method="get" action="">

                <div class="modal-header" style="background-color: transparent; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <h5 class="modal-title text-white">Informations de paiement</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>

                <div class="modal-body" style="background-color: transparent;">
                    <style>
                        #modal-paiement .form-control {
                            background-color: rgba(0, 0, 0, 0.2) !important;
                            border: 1px solid rgba(255, 255, 255, 0.2) !important;
                            color: white !important;
                        }
                        #modal-paiement .form-control::placeholder {
                            color: rgba(255, 255, 255, 0.4) !important;
                        }
                        #modal-paiement .form-control:focus {
                            background-color: rgba(0, 0, 0, 0.4) !important;
                            border-color: #206bc4 !important;
                            box-shadow: 0 0 0 0.25rem rgba(32, 107, 196, 0.25) !important;
                        }
                        #modal-paiement .modal-footer {
                            background-color: transparent !important;
                        }
                    </style>

                    <div class="mb-3">
                        <label class="form-label text-white">IBAN</label>
                        <input type="text" class="form-control" name="IBAN" placeholder="FR76 0000 0000 0000 0000 0000 000"  title="Veuillez saisir un IBAN valide" required>
                    </div>

                    <div class="text-muted mt-2 d-flex align-items-center" style="font-size: 0.85rem; color: rgba(255,255,255,0.6) !important;">
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-lock me-1" width="16" height="16" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
                            <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                            <circle cx="12" cy="16" r="1"></circle>
                            <path d="M8 11v-4a4 4 0 0 1 8 0v4"></path>
                        </svg>
                        Paiement 100% sécurisé
                    </div>
                </div>

                <div class="modal-footer" style="border-top: 1px solid rgba(255,255,255,0.1);">
                    <button type="button" class="btn btn-outline-light me-auto" data-bs-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-primary">Confirmer la transaction</button>
                </div>
            </form>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
<script>

    document.addEventListener("DOMContentLoaded", function() {
        const modalPaiement = document.getElementById('modal-paiement');
        if (modalPaiement) {
            modalPaiement.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                const carId = button.getAttribute('data-car-id');
                const form = document.getElementById('form-paiement');
                form.action = '/buy/' + carId;
            });
        }

    });


    function refreshCatalogue() {
        fetch('/catalogue/data')
            .then(response => {
                if (!response.ok) throw new Error('Session expirée ou erreur serveur');
                return response.text();
            })
            .then(html => {
                const carList = document.getElementById('car-list');
                if (carList) {
                    carList.innerHTML = html;
                }
            })
            .catch(err => {
                console.debug("Le catalogue ne peut pas être mis à jour :", err.message);
            });
    }

    const intervalId = setInterval(refreshCatalogue, 2000);

    window.onbeforeunload = function() {
        clearInterval(intervalId);
    };
</script>
</body>
</html>
