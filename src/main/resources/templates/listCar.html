<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes voitures - Mon Garage</title>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/bg.css}"/>
    <style>
        .glass-card .table {
            color: white !important;
            margin-bottom: 0;
        }

        .glass-card .table thead th {
            color: rgba(255, 255, 255, 0.9) !important;
            background: rgba(0, 0, 0, 0.2) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important;
        }

        .glass-card .table tbody td {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .empty-title {
            color: white !important;
        }
    </style>
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">

<div class="page">
    <div th:replace="~{navbar :: maNavbar}"></div>

    <div class="page-wrapper">
        <div class="container-xl py-4">
            <div class="page-header mb-4">
                <div class="row align-items-center">
                    <div class="col">
                        <h2 class="page-title text-white">Mon Garage</h2>
                        <div class="text-muted mt-1">Voici les véhicules que vous possédez ou louez.</div>
                    </div>
                </div>
            </div>

            <div class="card glass-card">
                <div class="table-responsive">
                    <table class="table table-vcenter card-table">
                        <thead>
                        <tr>
                            <th>Marque & Modèle</th>
                            <th>Année</th>
                            <th>Couleur</th>
                            <th>Type</th>
                            <th>Prix réglé</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${cars}">
                            <td>
                                <div class="fw-bold" th:text="${c.marque}">Marque</div>
                                <div class="text-muted small" th:text="${c.modele}">Modèle</div>
                            </td>
                            <td th:text="${c.annee}">2000</td>
                            <td th:text="${c.couleur}">Couleur</td>
                            <td>
                                <span class="badge bg-azure-lt" th:text="${c.typeOffre}">Type</span>
                            </td>
                            <td class="fw-bold" th:text="${c.prix + ' €'}">0 €</td>
                            <td class="text-end">
                                <form method="post" onsubmit="return confirm('Confirmer cette action ?');"
                                      th:action="@{/cars/release/{id}(id=${c.id})}">
                                    <button th:class="${c.typeOffre?.name() == 'LOCATION' ? 'btn btn-outline-info btn-sm' : 'btn btn-outline-danger btn-sm'}"
                                            type="submit">
                                        <span th:text="${c.typeOffre?.name() == 'LOCATION' ? 'Rendre la location' : 'Supprimer mon achat'}">Action</span>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="empty py-5 text-center" th:if="${#lists.isEmpty(cars)}">
                    <p class="empty-title">Votre garage est vide</p>
                    <p class="empty-subtitle text-muted">
                        Allez faire un tour sur le catalogue pour louer ou acheter votre première voiture !
                    </p>
                    <div class="empty-action">
                        <a class="btn btn-custom" th:href="@{/catalogue}">
                            Voir le catalogue
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
</body>
</html>
