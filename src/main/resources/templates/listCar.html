<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Liste des voitures</title>
    <script
            src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js">
    </script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" />
</head>
<body class="p-4">
<div class="container" style="max-width: 800px; margin: 0 auto;">
<h2 class="mb-4 text-center">Liste des voitures</h2>

<div class="table-responsive">
    <table class="table table-striped table-hover table-bordered shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>Marque</th>
            <th>Modèle</th>
            <th>Couleur</th>
            <th>Année</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${cars}">
            <td th:text="${c.marque}"></td>
            <td th:text="${c.modele}"></td>
            <td th:text="${c.couleur}"></td>
            <td th:text="${c.annee}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(cars)}" class="alert alert-info text-center">
        Aucune voiture n'a été trouvée dans la base de données.
    </div>
</div>

<a th:href="@{/car}" class="btn btn-primary">Retour au formulaire</a>
</div>
</body>
</html>
