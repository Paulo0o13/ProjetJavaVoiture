<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<body>

<header class="navbar navbar-expand-md d-print-none bg-dark" data-bs-theme="dark" th:fragment="maNavbar">
    <div class="container-xl">
        <h1 class="navbar-brand navbar-brand-autodark">
            <span class="text-white">Garage Élite</span>
        </h1>

        <div class="collapse navbar-collapse" id="navbar-menu">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalogue}">
                        <span class="nav-link-title">Catalogue</span>
                    </a>
                </li>

                <li class="nav-item" th:if="${loggedUser != null && loggedUser.role?.name() == 'USER'}">
                    <a class="nav-link" th:href="@{/cars}">
                        <span class="nav-link-title">Mon Garage</span>
                    </a>
                </li>

                <li class="nav-item" th:if="${loggedUser != null && loggedUser.role?.name() == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/add-car}">
                        <span class="nav-link-title text-warning">Ajouter un véhicule</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="navbar-nav flex-row order-md-last">
            <div class="nav-item d-none d-md-flex me-3">
                <span class="nav-link px-0 text-white">
                    Bienvenue, <strong
                        th:text="${loggedUser != null ? loggedUser.pseudo : 'Invité'}">Utilisateur</strong>
                </span>
            </div>
            <div class="nav-item">
                <a class="btn btn-outline-danger btn-sm" th:href="@{/logout}">Déconnexion</a>
            </div>
        </div>
    </div>
</header>

</body>
</html>
