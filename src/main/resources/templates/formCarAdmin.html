<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administration - Ajouter au Catalogue</title>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/bg.css}"/>
</head>
<body class="d-flex flex-column" style="min-height: 100vh;">

<div class="page">
    <div th:replace="~{navbar :: maNavbar}"></div>

    <div class="page-wrapper">
        <div class="container p-4 mt-4" style="max-width: 600px; margin: 0 auto;">

            <div class="card shadow-lg border-0 glass-card">
                <div class="card-header pt-4 pb-3 border-bottom-0">
                    <h2 class="mb-0 text-center w-100">Ajouter au Catalogue (Admin)</h2>
                </div>

                <div class="card-body p-4">
                    <form method="post" th:action="@{/admin/add-car}" th:object="${car}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Marque :</label>
                            <input class="form-control glass-input" required th:field="*{marque}" type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Modèle :</label>
                            <input class="form-control glass-input" required th:field="*{modele}" type="text">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Couleur :</label>
                                <input class="form-control glass-input" required th:field="*{couleur}" type="text">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Année :</label>
                                <input class="form-control glass-input" required th:field="*{annee}" type="number">
                            </div>
                        </div>

                        <hr style="border-top: 1px solid rgba(255,255,255,0.2);">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Prix (€) :</label>
                            <input class="form-control glass-input" placeholder="Ex: 15000" required step="0.01"
                                   th:field="*{prix}" type="number">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Type de contrat :</label>
                            <select class="form-select glass-input" required th:field="*{typeOffre}">
                                <option value="ACHAT">Vente</option>
                                <option value="LOCATION">Location / jour</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-custom" type="submit">Publier dans le catalogue</button>
                            <a class="btn btn-outline-custom" th:href="@{/catalogue}">Annuler</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
</body>
</html>
