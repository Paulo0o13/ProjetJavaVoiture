<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/bg.css}"/>
</head>

<body class="d-flex flex-column" style="min-height: 100vh; justify-content: center;">

<div class="container container-tight py-4">
    <div class="text-center mb-4">
        <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">Mes Voitures</h1>
    </div>

    <div class="card card-md shadow-lg glass-card">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">Connectez-vous à votre compte</h2>

            <div class="alert alert-danger" th:if="${param.error}">
                Pseudo ou mot de passe incorrect.
            </div>

            <form autocomplete="off" method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur (Pseudo)</label>
                    <input class="form-control glass-input" name="pseudo" placeholder="Entrez votre pseudo" required
                           type="text">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input class="form-control glass-input" name="password" placeholder="Mot de passe" required
                           type="password">
                </div>
                <div class="form-footer">
                    <button class="btn btn-custom w-100" type="submit">Se connecter</button>
                </div>
            </form>
        </div>
    </div>

    <div class="text-center mt-3" style="color: rgba(255,255,255,0.9);">
        Pas encore de compte ? <a style="color: white; font-weight: bold; text-decoration: underline;" tabindex="-1"
                                  th:href="@{/register}">S'inscrire</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
</body>
</html>
